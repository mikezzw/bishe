<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能推荐调试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .log { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 智能推荐功能调试</h1>
        
        <div>
            <button onclick="testRecommendation()">测试推荐功能</button>
            <button onclick="clearLogs()">清空日志</button>
        </div>
        
        <div id="logs"></div>
    </div>

    <script>
        // 模拟axios
        const axios = {
            post: async (url, data, config) => {
                log(`📡 发送请求到: ${url}`, 'info');
                log(`📝 请求数据: ${JSON.stringify(data, null, 2)}`, 'info');
                
                // 模拟真实的API响应
                return new Promise((resolve) => {
                    setTimeout(() => {
                        const mockResponse = {
                            code: 200,
                            message: '匹配计算成功',
                            data: [
                                {
                                    id: 1,
                                    animal: {
                                        id: 25,
                                        name: '测试猫咪',
                                        breed: '中华田园猫',
                                        age: 12,
                                        images: [],
                                        description: '可爱的中华田园猫'
                                    },
                                    match_score: 0.825,
                                    match_reason: '性格匹配度高'
                                },
                                {
                                    id: 2,
                                    animal: {
                                        id: 26,
                                        name: '测试狗狗',
                                        breed: '金毛',
                                        age: 24,
                                        images: [],
                                        description: '友善的金毛犬'
                                    },
                                    match_score: 0.78,
                                    match_reason: '性格互补性强'
                                }
                            ]
                        };
                        log(`✅ 收到响应: ${JSON.stringify(mockResponse, null, 2)}`, 'success');
                        resolve({ data: mockResponse });
                    }, 1000);
                });
            }
        };

        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const logEntry = document.createElement('div');
            logEntry.className = `log ${type}`;
            logEntry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        async function testRecommendation() {
            log('🚀 开始测试推荐功能...', 'info');
            
            try {
                // 模拟用户性格测试得分
                const userScores = {
                    openness: 3.5,
                    conscientiousness: 4.0,
                    extraversion: 2.5,
                    agreeableness: 3.0,
                    neuroticism: 2.0
                };
                
                log(`👤 用户性格得分: ${JSON.stringify(userScores)}`, 'info');
                
                // 调用推荐API
                const response = await axios.post('/adoptions/matches/calculate-match/', {
                    user_scores: userScores
                });
                
                log(`📡 API响应: ${JSON.stringify(response, null, 2)}`, 'info');
                
                // 处理响应数据
                let recommendedData = [];
                
                log('🔍 开始处理响应格式...', 'info');
                
                // 处理自定义响应格式 (code/message/data)
                if (response && typeof response.data === 'object' && response.data.code === 200 && response.data.data) {
                    log('✅ 检测到自定义响应格式 (code/message/data)', 'success');
                    recommendedData = Array.isArray(response.data.data) ? response.data.data : [response.data.data];
                    log(`📦 提取的数据数量: ${recommendedData.length}`, 'info');
                } else {
                    log('❌ 未知响应格式', 'error');
                    log(`响应详情: ${JSON.stringify(response, null, 2)}`, 'error');
                    throw new Error('响应格式不正确');
                }
                
                // 处理推荐结果
                const recommendedAnimals = recommendedData.map(item => ({
                    id: item.animal.id,
                    name: item.animal.name,
                    breed: item.animal.breed,
                    age: item.animal.age,
                    images: item.animal.images,
                    match_score: Math.round(item.match_score * 100),
                    description: item.animal.description
                }));
                
                log(`🎯 处理后的推荐动物数据: ${JSON.stringify(recommendedAnimals, null, 2)}`, 'success');
                log(`📈 推荐动物数量: ${recommendedAnimals.length}`, 'success');
                
                if (recommendedAnimals.length > 0) {
                    log('🎉 成功获取到推荐动物！', 'success');
                    recommendedAnimals.forEach((animal, index) => {
                        log(`${index + 1}. ${animal.name} (匹配度: ${animal.match_score}%)`, 'success');
                    });
                } else {
                    log('⚠️ 未找到匹配的动物', 'error');
                }
                
            } catch (error) {
                log(`❌ 测试失败: ${error.message}`, 'error');
                log(`错误堆栈: ${error.stack}`, 'error');
            }
        }

        // 页面加载时自动运行一次测试
        window.onload = function() {
            log('🔧 调试页面已加载', 'info');
            log('点击"测试推荐功能"按钮开始调试', 'info');
        };
    </script>
</body>
</html>
